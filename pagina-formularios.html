<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Etiquetas de formularios</title>
</head>
<body class="container py-4">
    <!-- <header>, <h1> y <p> presentan el objetivo de la página. -->
    <header class="mb-4">
        <h1 class="alert alert-dark">Ejemplos de etiquetas de formularios</h1>
        <p>Esta página reúne etiquetas HTML relacionadas con formularios y entrada de datos.</p>
    </header>

    <!-- <nav> crea enlaces para moverse entre las distintas páginas del proyecto. -->
    <nav class="mb-4">
        <a class="btn btn-outline-primary me-2" href="index.html">Volver al inicio</a>
        <a class="btn btn-outline-warning me-2" href="pagina-bloques.html">Ir a etiquetas block</a>
        <a class="btn btn-outline-success" href="pagina-secundaria.html">Ir a etiquetas inline</a>
    </nav>

    <!-- <form> agrupa todos los campos de entrada de datos. -->
    <form class="row g-3 border p-3 rounded bg-light">
        <!-- <fieldset> y <legend> organizan campos relacionados en un bloque. -->
        <fieldset class="col-12">
            <legend>Datos personales</legend>
            <div class="row g-3">
                <!-- <label> describe cada campo <input> para mejorar claridad y accesibilidad. -->
                <div class="col-md-6">
                    <label for="nombre" class="form-label">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Ej: Ana Pérez" required>
                </div>
                <div class="col-md-6">
                    <label for="correo" class="form-label">Correo electrónico</label>
                    <input type="email" id="correo" name="correo" class="form-control" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="col-md-4">
                    <label for="edad" class="form-label">Edad</label>
                    <input type="number" id="edad" name="edad" class="form-control" min="16" max="99">
                </div>
                <div class="col-md-4">
                    <label for="fecha" class="form-label">Fecha de inscripción</label>
                    <input type="date" id="fecha" name="fecha" class="form-control">
                </div>
                <div class="col-md-4">
                    <label for="hora" class="form-label">Horario preferido</label>
                    <input type="time" id="hora" name="hora" class="form-control">
                </div>
            </div>
        </fieldset>

        <!-- <select>, <option> y <optgroup> crean listas desplegables agrupadas por categorías. -->
        <div class="col-md-6">
            <label for="curso" class="form-label">Curso de interés</label>
            <select id="curso" name="curso" class="form-select">
                <optgroup label="Desarrollo Web">
                    <option>HTML y CSS</option>
                    <option>JavaScript Inicial</option>
                </optgroup>
                <optgroup label="Programación">
                    <option>Python Básico</option>
                    <option>Lógica de Programación</option>
                </optgroup>
            </select>
        </div>

        <!-- <datalist> ofrece sugerencias para un campo <input> editable. -->
        <div class="col-md-6">
            <label for="ciudad" class="form-label">Ciudad</label>
            <input list="lista-ciudades" id="ciudad" name="ciudad" class="form-control" placeholder="Seleccioná o escribí una ciudad">
            <datalist id="lista-ciudades">
                <option value="Rosario"></option>
                <option value="Santa Fe"></option>
                <option value="Córdoba"></option>
                <option value="Buenos Aires"></option>
            </datalist>
        </div>

        <!-- <textarea> permite ingresar texto extenso como comentarios o consultas. -->
        <div class="col-12">
            <label for="comentarios" class="form-label">Comentarios</label>
            <textarea id="comentarios" name="comentarios" class="form-control" rows="4" placeholder="Escribí tu consulta aquí..."></textarea>
        </div>

        <!-- Campos de selección con <input> tipo radio y checkbox para opciones múltiples o únicas. -->
        <div class="col-md-6">
            <p class="mb-1">Modalidad</p>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="modalidad" id="presencial" value="presencial" checked>
                <label class="form-check-label" for="presencial">Presencial</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="modalidad" id="virtual" value="virtual">
                <label class="form-check-label" for="virtual">Virtual</label>
            </div>
        </div>

        <div class="col-md-6">
            <p class="mb-1">Temas de interés</p>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="tema-html" name="temas" value="html">
                <label class="form-check-label" for="tema-html">HTML</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="tema-css" name="temas" value="css">
                <label class="form-check-label" for="tema-css">CSS</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="tema-js" name="temas" value="js">
                <label class="form-check-label" for="tema-js">JavaScript</label>
            </div>
        </div>

        <!-- <progress> y <meter> muestran indicadores visuales de progreso y nivel. -->
        <div class="col-md-6">
            <label for="progreso" class="form-label">Progreso del formulario</label>
            <progress id="progreso" value="70" max="100" class="w-100"></progress>
        </div>
        <div class="col-md-6">
            <label for="nivel" class="form-label">Nivel de conocimientos previos</label>
            <meter id="nivel" min="0" max="10" value="6" class="w-100">6 de 10</meter>
        </div>

        <!-- <button> y tipos submit/reset/button permiten enviar, limpiar o ejecutar acciones en el formulario. -->
        <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Enviar formulario</button>
            <button type="reset" class="btn btn-secondary">Limpiar campos</button>
            <button type="button" class="btn btn-info">Botón de ejemplo</button>
        </div>
    </form>

    <!-- Enlace adicional para volver rápidamente al index principal. -->
    <div class="mt-4">
        <a class="btn btn-dark" href="index.html">Volver al index.html</a>
    </div>
</body>
</html>
